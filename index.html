<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Star | Estética Automóvel de Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;900&display=swap');

        :root {
            --vermelho-ferrari: #FF0000;
            --preto-fosco: #050505;
        }

        body {
            background-color: var(--preto-fosco);
            color: white;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* --- SISTEMA DE CAMADAS CALIBRADAS --- */
        #landing-view {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1), opacity 1.2s ease;
        }

        .car-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: 50% 50%;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            z-index: 1;
            transform: scale(1.15);
            will-change: opacity;
        }

        #frame-off { background-image: url('https://carrosest.carrd.co/assets/images/image01.jpg?v=0259a93f'); opacity: 1; }
        #frame-ambient { background-image: url('https://carrosest.carrd.co/assets/images/image02.jpg?v=0259a93f'); }
        #frame-xenon { background-image: url('https://carrosest.carrd.co/assets/images/image03.jpg?v=0259a93f'); }

        .vignette {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 40%, transparent 60%, rgba(0,0,0,1) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* --- BRANDING --- */
        .header-text { position: relative; z-index: 20; }
        .main-brand {
            position: relative;
            z-index: 20;
            text-align: center;
        }
        .brand-title {
            font-size: 3rem;
            font-weight: 300;
            color: white;
            letter-spacing: -2px;
            line-height: 0.9;
        }
        .brand-title .star-bold { font-weight: 900; }

        /* --- BOTÃO START-STOP COM PROGRESSO CIRCULAR --- */
        .start-stop-container {
            position: relative;
            z-index: 100;
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .engine-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .progress-ring {
            position: absolute;
            transform: rotate(-90deg);
            pointer-events: none;
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
        }

        .ring-bg { stroke: rgba(255, 255, 255, 0.05); }
        .ring-fill {
            stroke: var(--vermelho-ferrari);
            stroke-dasharray: 314; 
            stroke-dashoffset: 314;
            transition: stroke-dashoffset 1.5s linear !important;
        }

        .engine-button {
            width: 105px;
            height: 105px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #222, #000);
            border: 3px solid #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            -webkit-tap-highlight-color: transparent;
        }

        .engine-button:hover {
            border-color: #444;
            transform: scale(1.02);
        }

        .engine-button .label { font-size: 8px; font-weight: 900; color: #555; letter-spacing: 1px; }
        .engine-button .main-label { font-size: 16px; font-weight: 900; color: #bbb; letter-spacing: 1px; transition: color 0.3s; }

        .engine-button.holding { transform: scale(0.95); }
        .engine-button.active-ignition .main-label { color: var(--vermelho-ferrari); text-shadow: 0 0 10px var(--vermelho-ferrari); }

        .hint-text {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            margin-top: 20px;
        }

        /* --- TELA DE PRELOADER SOFISTICADA --- */
        #experience-view {
            position: fixed;
            inset: 0;
            z-index: 100;
            background-color: var(--preto-fosco);
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

        /* Efeito de luz de fundo para o loader */
        #experience-view::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,0,0,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .star-loader {
            width: 70px;
            fill: white;
            animation: pulse-sophisticated 3s infinite ease-in-out;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
        }

        @keyframes pulse-sophisticated {
            0%, 100% { opacity: 0.2; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.7; transform: scale(1.05) rotate(5deg); }
        }

        .progress-rail {
            width: 240px;
            height: 1px;
            background: rgba(255,255,255,0.03);
            margin-top: 40px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--vermelho-ferrari), transparent);
            animation: flow-sophisticated 2.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes flow-sophisticated {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .status-container {
            height: 20px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-text {
            font-size: 8px;
            tracking: 0.6em;
            color: #555;
            text-transform: uppercase;
            transition: all 0.5s ease;
        }

        /* --- ANIMAÇÕES DE IMPACTO --- */
        .shake-intense { animation: shake-impact 0.6s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake-impact {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        .fade-out-up { transform: translateY(-40px); opacity: 0; pointer-events: none; }
        .show-view { display: flex !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <audio id="ignition-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2554/2554-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="landing-view">
        <div id="frame-off" class="car-layer"></div>
        <div id="frame-ambient" class="car-layer"></div>
        <div id="frame-xenon" class="car-layer"></div>
        <div class="vignette"></div>

        <header class="header-text mt-12">
            <h2 class="text-[9px] tracking-[1.4em] text-zinc-500 font-light text-center uppercase">
                Estética Automóvel de Elite | Chapecó
            </h2>
        </header>

        <div class="main-brand">
            <h1 class="brand-title">BLACK <span class="star-bold">STAR</span></h1>
            <div class="w-12 h-[1px] bg-zinc-800 mx-auto mt-4"></div>
        </div>

        <div class="start-stop-container">
            <div class="engine-wrapper">
                <svg class="progress-ring" width="130" height="130">
                    <circle class="ring-bg" cx="65" cy="65" r="50"></circle>
                    <circle id="progress-circle" class="ring-fill" cx="65" cy="65" r="50"></circle>
                </svg>
                
                <div id="start-btn" class="engine-button" 
                     onmousedown="handleStart(event)" 
                     onmouseup="handleEnd()" 
                     onmouseleave="handleEnd()"
                     ontouchstart="handleStart(event)" 
                     ontouchend="handleEnd()">
                    <span class="label">ENGINE</span>
                    <span class="main-label">START</span>
                    <span class="label">STOP</span>
                </div>
            </div>
            <p class="hint-text" id="hint">Mantenha pressionado para ligar</p>
        </div>
    </div>

    <!-- TELA DE TRANSIÇÃO (PRE-LOADER REFINADO) -->
    <div id="experience-view">
        <svg class="star-loader" viewBox="0 0 24 24">
            <path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/>
        </svg>
        <div class="progress-rail"><div class="progress-bar"></div></div>
        <div class="status-container">
            <p class="status-text" id="load-status">A inicializar Protocolos...</p>
        </div>
    </div>

    <main id="blank-canvas" class="hidden fixed inset-0 flex items-center justify-center bg-[#080808] z-[200] opacity-0 transition-opacity duration-1000">
        <h3 class="text-zinc-800 text-[10px] tracking-[1.5em] uppercase">Ready | Waiting for Engine</h3>
    </main>

    <script>
        let holdTimer;
        let isStarted = false;
        const btn = document.getElementById('start-btn');
        const circle = document.getElementById('progress-circle');
        const ambient = document.getElementById('frame-ambient');
        const xenon = document.getElementById('frame-xenon');
        const sound = document.getElementById('ignition-sound');
        const hint = document.getElementById('hint');

        function handleStart(e) {
            e.preventDefault();
            if (isStarted) return;

            btn.classList.add('holding');
            ambient.style.opacity = "1";
            circle.style.strokeDashoffset = "0";

            holdTimer = setTimeout(() => {
                igniteEngine();
            }, 1500); 
        }

        function handleEnd() {
            if (isStarted) return;
            
            btn.classList.remove('holding');
            clearTimeout(holdTimer);
            
            circle.style.transition = "none";
            circle.style.strokeDashoffset = "314";
            setTimeout(() => {
                circle.style.transition = "stroke-dashoffset 1.5s linear !important";
            }, 50);

            ambient.style.opacity = "0";
        }

        function igniteEngine() {
            isStarted = true;
            btn.classList.add('active-ignition');
            
            // Ativa faróis Xenon
            xenon.style.opacity = "1";
            
            // Vibração e Som
            if ("vibrate" in navigator) {
                navigator.vibrate([100, 30, 100, 30, 400]); 
            }
            sound.volume = 0.7;
            sound.play();
            
            // Tremor de impacto
            document.body.classList.add('shake-intense');
            hint.innerText = "Ignition Online";

            // AGUARDA 2 SEGUNDOS COM O CARRO LIGADO (Conforme solicitado)
            setTimeout(() => {
                document.getElementById('landing-view').classList.add('fade-out-up');
                
                setTimeout(() => {
                    const expView = document.getElementById('experience-view');
                    expView.classList.add('show-view');
                    
                    const statusText = document.getElementById('load-status');
                    
                    // Sequência de Pre-load Sofisticada
                    setTimeout(() => {
                        statusText.style.opacity = "0";
                        setTimeout(() => {
                            statusText.innerText = "Analisando Reflexos em Chapecó...";
                            statusText.style.opacity = "1";
                        }, 500);
                    }, 1500);

                    setTimeout(() => {
                        statusText.style.opacity = "0";
                        setTimeout(() => {
                            statusText.innerText = "Otimizando Nível de Brilho Estelar...";
                            statusText.style.opacity = "1";
                        }, 500);
                    }, 3500);

                    setTimeout(() => {
                        statusText.style.opacity = "0";
                        setTimeout(() => {
                            statusText.innerText = "Sistema Black Star Pronto.";
                            statusText.style.opacity = "1";
                        }, 500);
                    }, 5500);
                    
                    // Finalização
                    setTimeout(() => {
                        expView.style.opacity = "0";
                        setTimeout(() => {
                            expView.style.display = "none";
                            const canvas = document.getElementById('blank-canvas');
                            canvas.classList.remove('hidden');
                            setTimeout(() => canvas.style.opacity = "1", 100);
                        }, 1200);
                    }, 7500);
                }, 1000);
            }, 2000); // <-- Tempo de 2 segundos após ligar o carro
        }
    </script>
</body>
</html>
