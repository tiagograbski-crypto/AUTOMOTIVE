<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Star | Estética Automóvel de Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;900&display=swap');

        :root {
            --vermelho-ferrari: #FF0000;
            --preto-fosco: #050505;
        }

        body {
            background-color: var(--preto-fosco);
            color: white;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* --- SISTEMA DE CAMADAS CALIBRADAS --- */
        #landing-view {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1), opacity 1s ease;
        }

        .car-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: 50% 50%;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            z-index: 1;
            transform: scale(1.15);
            will-change: opacity;
        }

        #frame-off { background-image: url('https://carrosest.carrd.co/assets/images/image01.jpg?v=0259a93f'); opacity: 1; }
        #frame-ambient { background-image: url('https://carrosest.carrd.co/assets/images/image02.jpg?v=0259a93f'); }
        #frame-xenon { background-image: url('https://carrosest.carrd.co/assets/images/image03.jpg?v=0259a93f'); }

        .vignette {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 40%, transparent 60%, rgba(0,0,0,1) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* --- BRANDING --- */
        .header-text { position: relative; z-index: 20; }
        .main-brand {
            position: relative;
            z-index: 20;
            text-align: center;
            transition: all 1s ease;
        }
        .brand-title {
            font-size: 3rem;
            font-weight: 300;
            color: white;
            letter-spacing: -2px;
            line-height: 0.9;
        }
        .brand-title .star-bold { font-weight: 900; }

        /* --- BOTÃO START-STOP --- */
        .start-stop-container {
            position: relative;
            z-index: 100;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .engine-button {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #222, #000);
            border: 4px solid #333;
            box-shadow: 0 0 0 2px #111, 0 10px 20px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Efeito de Hover: Fica Vermelho ao passar o rato */
        .engine-button:hover {
            border-color: var(--vermelho-ferrari);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .engine-button:hover .main-label {
            color: var(--vermelho-ferrari);
            text-shadow: 0 0 8px rgba(255, 0, 0, 0.4);
        }

        .engine-button::after {
            content: '';
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .engine-button .label {
            font-size: 8px;
            font-weight: 900;
            color: #555;
            letter-spacing: 1px;
            margin-bottom: 2px;
            transition: color 0.3s;
        }

        .engine-button .main-label {
            font-size: 16px;
            font-weight: 900;
            color: #bbb;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .engine-button.holding {
            transform: scale(0.94);
            border-color: var(--vermelho-ferrari);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.5);
            background: radial-gradient(circle at center, #200, #000);
        }

        .engine-button.holding .main-label {
            color: var(--vermelho-ferrari);
            text-shadow: 0 0 15px rgba(255,0,0,0.8);
        }

        .hint-text {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #555;
            margin-top: 20px;
            transition: opacity 0.3s;
        }

        /* --- EXPERIENCE & PRELOADER --- */
        #experience-view {
            position: fixed;
            inset: 0;
            z-index: 100;
            background-color: var(--preto-fosco);
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .star-loader {
            width: 60px;
            fill: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .progress-rail {
            width: 200px;
            height: 1px;
            background: rgba(255,255,255,0.05);
            margin-top: 30px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--vermelho-ferrari);
            animation: flow 1.5s infinite;
        }

        @keyframes flow {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* --- ANIMAÇÕES --- */
        .shake-intense { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            20% { transform: translate(3px, -3px); }
            40% { transform: translate(-3px, 3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(-3px, -3px); }
        }
        
        .fade-out-up { transform: translateY(-30px); opacity: 0; pointer-events: none; }
        .show-view { display: flex !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <audio id="ignition-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2554/2554-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="landing-view">
        <div id="frame-off" class="car-layer"></div>
        <div id="frame-ambient" class="car-layer"></div>
        <div id="frame-xenon" class="car-layer"></div>
        <div class="vignette"></div>

        <header class="header-text mt-12">
            <h2 class="text-[9px] md:text-[10px] tracking-[1.4em] text-zinc-500 font-light text-center uppercase">
                Estética Automóvel de Elite | Chapecó
            </h2>
        </header>

        <div class="main-brand">
            <h1 class="brand-title">BLACK <span class="star-bold">STAR</span></h1>
            <div class="w-12 h-[1px] bg-zinc-800 mx-auto mt-4"></div>
        </div>

        <div class="start-stop-container">
            <div id="start-btn" class="engine-button" 
                 onmousedown="handleStart(event)" 
                 onmouseup="handleEnd()" 
                 onmouseleave="handleEnd()"
                 ontouchstart="handleStart(event)" 
                 ontouchend="handleEnd()">
                <span class="label">ENGINE</span>
                <span class="main-label">START</span>
                <span class="label">STOP</span>
            </div>
            <p class="hint-text" id="hint">Segure para ligar o motor</p>
        </div>
    </div>

    <!-- TELA DE TRANSIÇÃO -->
    <div id="experience-view">
        <svg class="star-loader" viewBox="0 0 24 24">
            <path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/>
        </svg>
        <div class="progress-rail"><div class="progress-bar"></div></div>
        <p class="text-[8px] tracking-[0.6em] text-zinc-600 uppercase mt-5" id="load-status">Sincronizando Sistema...</p>
    </div>

    <main id="blank-canvas" class="hidden fixed inset-0 flex items-center justify-center bg-[#080808] z-[200] opacity-0 transition-opacity duration-1000">
        <h3 class="text-zinc-800 text-[10px] tracking-[1.5em] uppercase">Ready | Waiting for Engine</h3>
    </main>

    <script>
        let holdTimer;
        let isStarted = false;
        const btn = document.getElementById('start-btn');
        const ambient = document.getElementById('frame-ambient');
        const xenon = document.getElementById('frame-xenon');
        const hint = document.getElementById('hint');
        const sound = document.getElementById('ignition-sound');

        function handleStart(e) {
            e.preventDefault();
            if (isStarted) return;

            btn.classList.add('holding');
            
            // NÍVEL 1: Luzes de presença ao tocar
            ambient.style.opacity = "1";
            hint.innerText = "Mantenha pressionado...";

            // NÍVEL 2: Ignição após 1.2 segundos
            holdTimer = setTimeout(() => {
                igniteEngine();
            }, 1200);
        }

        function handleEnd() {
            if (isStarted) return;
            
            btn.classList.remove('holding');
            clearTimeout(holdTimer);
            hint.innerText = "Segure para ligar o motor";
        }

        function igniteEngine() {
            isStarted = true;
            btn.classList.remove('holding');
            
            xenon.style.opacity = "1";
            
            if ("vibrate" in navigator) {
                navigator.vibrate([100, 50, 100, 50, 300]); 
            }

            sound.volume = 0.6;
            sound.play();
            
            document.body.classList.add('shake-intense');

            setTimeout(() => {
                document.getElementById('landing-view').classList.add('fade-out-up');
                
                setTimeout(() => {
                    const expView = document.getElementById('experience-view');
                    expView.classList.add('show-view');
                    
                    const statusText = document.getElementById('load-status');
                    setTimeout(() => statusText.innerText = "Calibrando Brilho em Chapecó...", 1500);
                    setTimeout(() => statusText.innerText = "Injetando Ceramic Coating...", 3000);
                    
                    setTimeout(() => {
                        expView.style.opacity = "0";
                        setTimeout(() => {
                            expView.style.display = "none";
                            const canvas = document.getElementById('blank-canvas');
                            canvas.classList.remove('hidden');
                            setTimeout(() => canvas.style.opacity = "1", 100);
                        }, 1000);
                    }, 4500);
                }, 800);
            }, 500);
        }
    </script>
</body>
</html>
