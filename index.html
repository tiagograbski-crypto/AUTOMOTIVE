<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Star | Estética Automóvel de Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;900&display=swap');

        :root {
            --vermelho-ferrari: #FF0000;
            --preto-fosco: #050505;
            --chumbo: #121212;
        }

        body {
            background-color: var(--preto-fosco);
            color: white;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            height: 100vh;
        }

        /* --- LANDING VIEW --- */
        #landing-view {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1), opacity 1s ease;
        }

        .car-layer {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            z-index: 1;
            transform: scale(1.05);
        }

        #frame-off { background-image: url('https://carrosest.carrd.co/assets/images/image01.jpg?v=0259a93f'); opacity: 1; }
        #frame-ambient { background-image: url('https://carrosest.carrd.co/assets/images/image02.jpg?v=0259a93f'); }
        #frame-xenon { background-image: url('https://carrosest.carrd.co/assets/images/image03.jpg?v=0259a93f'); }

        .vignette {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.9) 100%);
            z-index: 5;
            pointer-events: none;
        }

        .main-brand {
            position: relative;
            z-index: 20;
            text-align: center;
            opacity: 0;
            transform: scale(0.95);
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1) 2s;
        }

        .brand-title {
            font-size: 3.5rem;
            font-weight: 300;
            color: white;
            letter-spacing: -2px;
            line-height: 0.9;
        }

        .brand-title .star-bold { font-weight: 900; }

        .btn-blackstar {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 1.2rem 3rem;
            font-size: 0.7rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: all 0.4s;
            color: #fff;
            width: 90%;
            max-width: 350px;
            position: relative;
            z-index: 60;
        }

        /* --- EXPERIENCE VIEW (PRE-LOAD DA PRÓXIMA PÁGINA) --- */
        #experience-view {
            position: fixed;
            inset: 0;
            z-index: 100;
            background-color: var(--preto-fosco);
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .load-content {
            text-align: center;
            width: 100%;
            max-width: 300px;
        }

        .star-loader {
            width: 80px;
            height: 80px;
            fill: white;
            margin: 0 auto 30px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
            animation: pulse-star 2s infinite ease-in-out;
        }

        @keyframes pulse-star {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .progress-rail {
            width: 100%;
            height: 1px;
            background: rgba(255,255,255,0.05);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--vermelho-ferrari), transparent);
            animation: flow 2s infinite linear;
        }

        @keyframes flow {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* --- CLASSES DE TRANSIÇÃO --- */
        .fade-out-up {
            transform: translateY(-50px);
            opacity: 0;
            pointer-events: none;
        }

        .show-view {
            display: flex !important;
            opacity: 1 !important;
        }

        .shake {
            animation: engine-shake 0.3s ease-in-out;
        }

        @keyframes engine-shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, 2px); }
            100% { transform: translate(0,0); }
        }
    </style>
</head>
<body>

    <!-- Áudio de Ignição Ferrari -->
    <audio id="ignition-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2554/2554-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- TELA INICIAL (LANDING) -->
    <div id="landing-view">
        <div id="frame-off" class="car-layer"></div>
        <div id="frame-ambient" class="car-layer"></div>
        <div id="frame-xenon" class="car-layer"></div>
        <div class="vignette"></div>

        <header class="header-text opacity-0 transition-all duration-1000 translate-y-[-20px] relative z-20">
            <h2 class="text-[10px] md:text-xs tracking-[1em] text-zinc-400 font-light text-center uppercase">
                Estética Automóvel de Elite
            </h2>
        </header>

        <div class="main-brand">
            <h1 class="brand-title">
                BLACK <span class="star-bold">STAR</span>
            </h1>
            <div class="w-16 h-[2px] bg-[var(--vermelho-ferrari)] mx-auto mt-6"></div>
        </div>

        <footer class="cta-container opacity-0 transition-all duration-1000 translate-y-[20px] relative z-20">
            <button class="btn-blackstar" onclick="startExperience()">
                Iniciar Experiência
            </button>
        </footer>
    </div>

    <!-- TELA DE TRANSIÇÃO / PRE-LOAD DA EXPERIÊNCIA -->
    <div id="experience-view">
        <div class="load-content">
            <svg class="star-loader" viewBox="0 0 24 24">
                <path d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/>
            </svg>
            <div class="progress-rail">
                <div class="progress-bar"></div>
            </div>
            <p class="text-[9px] tracking-[0.5em] text-zinc-500 uppercase mt-4" id="load-status">
                A ligar à Unidade de Brilho...
            </p>
        </div>
    </div>

    <!-- PÁGINA EM BRANCO (A AGUARDAR MOTOR) -->
    <main id="blank-canvas" class="hidden fixed inset-0 flex items-center justify-center bg-[#080808] z-[200] opacity-0 transition-opacity duration-1000">
        <div class="text-center">
            <h3 class="text-zinc-800 text-[10px] tracking-[1em] uppercase">Sistema Pronto | A aguardar Código do Motor</h3>
        </div>
    </main>

    <script>
        function startExperience() {
            // 1. Vibração
            if ("vibrate" in navigator) {
                navigator.vibrate([100, 50, 200]); 
            }

            // 2. Som e Efeito Visual de "Tremor"
            const sound = document.getElementById('ignition-sound');
            sound.volume = 0.5;
            sound.play();
            document.body.classList.add('shake');

            // 3. Transição de Saída
            const landing = document.getElementById('landing-view');
            landing.classList.add('fade-out-up');

            // 4. Inicia Pre-load da Próxima Página
            setTimeout(() => {
                const expView = document.getElementById('experience-view');
                expView.classList.add('show-view');
                
                const statusText = document.getElementById('load-status');
                setTimeout(() => statusText.innerText = "A sincronizar Sensores Ópticos...", 1000);
                setTimeout(() => statusText.innerText = "A finalizar Interface Black Star...", 2000);
                
                // 5. Finaliza e mostra a página em branco
                setTimeout(() => {
                    expView.style.opacity = "0";
                    setTimeout(() => {
                        expView.style.display = "none";
                        const canvas = document.getElementById('blank-canvas');
                        canvas.classList.remove('hidden');
                        setTimeout(() => canvas.style.opacity = "1", 100);
                    }, 1500);
                }, 3500);

            }, 600);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const ambient = document.getElementById('frame-ambient');
            const xenon = document.getElementById('frame-xenon');
            const header = document.querySelector('.header-text');
            const footer = document.querySelector('.cta-container');
            
            setTimeout(() => ambient.style.opacity = "1", 1200);
            setTimeout(() => {
                xenon.style.opacity = "1";
                document.body.classList.add('loaded');
                header.classList.remove('opacity-0', 'translate-y-[-20px]');
                footer.classList.remove('opacity-0', 'translate-y-[20px]');
            }, 2400);
        });
    </script>
</body>
</html>
